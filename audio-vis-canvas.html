<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"> 
    <style type="text/css">
        * {
            border: 0;
            margin: 0;
            padding: 0;
        }
        
        #audio {
            position: fixed;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        #audio:hover {
            opacity: 1.0;
        }
        
        .bar {
            display: block;
            height: calc(100% / 255);
            width: 100%;
            background-color: red;
        }
        
        .dd-hover {
            background-color: yellow;
        }
       
        #viz-canvas {
            width: 100%;
            height: 100%;
            position: fixed;
            z-index: 1;
        }
        
        #src-input {
            display: none;
        }
        
        #select-audio {
            position: fixed;
            right: 50px;
            font-family: Arial, sans-serif;
            padding: 6px;
            background-color: rgba(255, 0, 0, 0.50);
            color: #fff;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            font-size: 10px;
        }
        
        #select-audio:hover {
            background-color: rgba(255, 0, 0, 1.0);
        }
        
        #metadata {
            position: fixed;
            left: 12px;
            top: 52px;
            z-index: 10;
            font-family: 'Arial Unicode', Arial, sans-serif;
            font-size: 13px;
        }
        
        #player-controls {
            position: fixed;
            font-family: Arial, sans-serif;
            font-size: 10px;
            left:12px;
            top: 76px;
            z-index: 10;
        }
        
        #player-controls span {
            padding: 4px;
            cursor: pointer;
        }
        
        #player-controls span:hover {
            color: #fff;
            background-color: blue;
        }
        
        #pc-playlist {
            border: 1px solid grey;
        }
        
        #playlist {
            position: fixed;
            top: 112px;
            left: 28px;
            z-index: 10;
            font-family: Arial, sans-serif;
            font-size: 12px;
        }
        
        .playlist-item {
            cursor: pointer;
            padding: 2px 4px;
            transition: all 0.1s;
        }
        
        .playlist-item:hover {
            background-color: blue;
            color: #fff;
        }
        
        #viz-select {
            position: fixed;
            right: 50px;
            top: 24px;
            z-index: 10;
            font-family: Arial, sans-serif;
            font-size: 10px;
            padding: 4px;
            background-color: rgba(255, 0, 0, 0.50);
            color: #fff;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        #viz-select:hover {
            background-color: rgba(255, 0, 0, 1.0);
        }
        
        #viz-select option {
            background-color: #222;
            color: #fff;
        }
    </style>
    <script type="text/javascript" src="dataview-extra.js"></script>
    <script type="text/javascript">
        var renderFrame, barH, canvas = null, canvasCtx, queue = [], current = 0, playing = false, ready = false, vizMode = 'bars';
    
        var init = function() {
            if ( ready ) {
                return;
            }

            ready = true;

            var ctx = new AudioContext();
            var audio = document.getElementById('audio');
            var audioSrc = ctx.createMediaElementSource(audio);
            var analyser = ctx.createAnalyser();
            var rgbo = 0; // RGB Offset
            var rgboAccum = 0; // fractional accumulator for slow cycling
            
            audio.crossOrigin = 'Anonymous';
            
            canvas = document.getElementById('viz-canvas');
            canvasCtx = canvas.getContext('2d');
            
            // we have to connect the MediaElementSource with the analyser 
            audioSrc.connect(analyser);
            // then connect it to the audio destination
            audioSrc.connect(ctx.destination);
            
            // we could configure the analyser: e.g. analyser.fftSize (for further infos read the spec)

            // frequencyBinCount tells you how many values you'll receive from the analyser
            var frequencyData = new Uint8Array(analyser.frequencyBinCount);

            // we're ready to receive some data!
            // loop
            // horizontal bars visualization
            function renderBars(frequencyData) {
                for (var i = 0; i < 256; i++) {
                    var hue = ((i / 256) * 360 + rgbo * 1.41) % 360;
                    canvasCtx.fillStyle = 'hsl('+hue+', 100%, 50%)';
                    canvasCtx.fillRect(0, i * barH, canvas.width * (frequencyData[i]/255), barH);
                }
            }
            
            // radial visualization
            function renderRadial(frequencyData) {
                var cx = canvas.width / 2;
                var cy = canvas.height / 2;
                var maxRadius = Math.min(cx, cy) * 0.85;
                var baseRadius = maxRadius * 0.15;
                var barCount = 180;
                var sliceAngle = (Math.PI * 2) / barCount;
                
                canvasCtx.save();
                canvasCtx.translate(cx, cy);
                
                for (var i = 0; i < barCount; i++) {
                    var freqIndex = Math.floor(i * 256 / barCount);
                    var amplitude = frequencyData[freqIndex] / 255;
                    var barLength = amplitude * (maxRadius - baseRadius);
                    var angle = i * sliceAngle - Math.PI / 2;
                    
                    var hue = ((freqIndex / 256) * 360 + rgbo * 1.41) % 360;
                    canvasCtx.fillStyle = 'hsl('+hue+', 100%, 50%)';
                    canvasCtx.strokeStyle = 'hsl('+hue+', 100%, 50%)';
                    canvasCtx.lineWidth = Math.max(1, sliceAngle * baseRadius * 0.8);
                    
                    var x1 = Math.cos(angle) * baseRadius;
                    var y1 = Math.sin(angle) * baseRadius;
                    var x2 = Math.cos(angle) * (baseRadius + barLength);
                    var y2 = Math.sin(angle) * (baseRadius + barLength);
                    
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(x1, y1);
                    canvasCtx.lineTo(x2, y2);
                    canvasCtx.stroke();
                }
                
                canvasCtx.restore();
            }
            
            renderFrame = function () {
                requestAnimationFrame(renderFrame);
                // update data in frequencyData
                analyser.getByteFrequencyData(frequencyData);
                // render frame based on values in frequencyData
                canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

                if (vizMode === 'radial') {
                    renderRadial(frequencyData);
                } else {
                    renderBars(frequencyData);
                }
                
                rgboAccum = (rgboAccum + 0.0625) % 256;
                rgbo = Math.floor(rgboAccum);
            }; 
            
            // attaches drag/drop event to body (for changing src via drag/drop)
            function attachDragDropEventListeners() {
                var holder = document.getElementsByTagName('body')[0];
                var audio = document.getElementById('audio');
                
                holder.ondragover = function () { this.className = 'dd-hover'; return false; };
                holder.ondragend = function () { this.className = ''; return false; };
                holder.ondrop = function (e) {
                    this.className = '';
                    e.preventDefault();

                    var files = e.dataTransfer.files;
                    
                    parseID3v1(files);

                    return false;
                };
            }
            
            resizeCanvas();
            attachDragDropEventListeners();
            audio.addEventListener('ended', function () { nextSong(); });
            renderFrame();
        };

        window.addEventListener('click', function() {
            init();
        });
        
        window.addEventListener('resize', function () {
            resizeCanvas();
        });
        
        // resize canvas
        function resizeCanvas() {
            if ( canvas ) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                barH = canvas.height / 256;
            }
        }
        
        // read file then set source
        function readSong(file, md) {
            var audio = document.getElementById('audio');
            var reader = new FileReader();
                
            reader.onload = function () {
                // add to queue using object URL (avoids base64 overhead)
                var objectURL = URL.createObjectURL(file);
                queue.push({dataURL: objectURL, metadata: md, filename: file.name});
                console.log('song queued: ' + md.title);
                
                // if not already playing, play song.
                if (!playing && queue.length > 0) {
                    audio.src = queue[current].dataURL;
                    updateMetaData(queue[current].metadata);
                    audio.play().catch(function() {});
                    playing = true;
                }
            };
            
            reader.readAsArrayBuffer(file);
        }
        
        // update metadata
        function updateMetaData(md) {
            var el = document.getElementById('metadata');
            if (md.title !== '') {
                el.textContent = '\u266B ' + md.title + ' by ' + md.artist;
            }
            else {
                el.textContent = '\u266B ' + queue[current].filename;
            }
        }
        
        // move to next song
        function nextSong() {
            var audio = document.getElementById('audio');
            if (queue.length-1 > current) {
                audio.pause();
                current++;
                audio.src = queue[current].dataURL;
                updateMetaData(queue[current].metadata);
                audio.play().catch(function() {});
            }
            else {
                playing = false;
            }
        }
        
        // move to previous song
        function prevSong() {
            var audio = document.getElementById('audio');
            if (0 < current) {
                audio.pause();
                current--;
                audio.src = queue[current].dataURL;
                updateMetaData(queue[current].metadata);
                audio.play().catch(function() {});
            }
            else {
                playing = false;
            }
        }
        
        // move to queue index
        function indexSong(i) {
            var audio = document.getElementById('audio');
            if (-1 < i  && i < queue.length) {
                audio.pause();
                current = i;
                audio.src = queue[current].dataURL;
                updateMetaData(queue[current].metadata);
                audio.play().catch(function() {});
            }
            else {
                playing = false;
            }
        }
        
        // read ID3v1
        function parseID3v1(files) {
            for (var i = 0; i < files.length; i++) {
                (function(file) {
                var buffedReader = new FileReader();
                buffedReader.onload = function (event) {
                    // read ID3v1 data using jDataView
                    var dv = new DataView(event.target.result);
                    var metadata = {
                        title  : '',
                        artist : '',
                        album  : '',
                        year   : ''
                    };
                    
                    if (dv.getString(3, dv.byteLength - 128) === 'TAG') {
                        metadata.title  = dv.getString(30, dv.byteLength - 125);
                        metadata.artist = dv.getString(30, dv.byteLength - 95);
                        metadata.album  = dv.getString(30, dv.byteLength - 65);
                        metadata.year   = dv.getString(4, dv.byteLength - 61);
                    }
                    else {
                        // no ID3v1 data
                    }
                    
                    readSong(file, metadata);
                };
                
                buffedReader.readAsArrayBuffer(file);
                })(files[i]);
            }
        }
        
        // change the media source via file select
        function changeMediaSrc() {
            var files = document.getElementById("src-input").files;
            
            parseID3v1(files);
        }
        
        // show playlist
        function showPlaylist() {
            var plc = document.getElementById('pc-playlist');
            var data = plc.dataset;
            var pl = document.getElementById('playlist');
            
            if (data.plhidden === 'true') {
                // if font-symbol is a downarrow, show playlist
                pl.innerHTML = '';
                
                var ol = document.createElement('ol');
                for (var i = 0; i < queue.length; i++) {
                    (function(idx) {
                        var li = document.createElement('li');
                        li.className = 'playlist-item';
                        li.textContent = queue[idx].filename;
                        li.addEventListener('click', function() { indexSong(idx); });
                        ol.appendChild(li);
                    })(i);
                }
                pl.appendChild(ol);
                
                plc.textContent = '\u25B2';
                plc.dataset.plhidden = 'false';
                pl.style.display = 'block';
            }
            else {
                plc.textContent = '\u25BC';
                plc.dataset.plhidden = 'true';
                pl.style.display = 'none';
            }
        }
    </script>
</head>

<body>
    <span id="select-audio" onclick="document.getElementById('src-input').click()">SELECT AUDIO</span>
    <select id="viz-select" onchange="vizMode = this.value">
        <option value="bars">Horizontal Bars</option>
        <option value="radial">Radial</option>
    </select>
    <input id="src-input" type="file" onchange="changeMediaSrc()" multiple />
    <audio id="audio" src="" controls></audio>
    <canvas id="viz-canvas"></canvas>
    <div id="metadata"></div>
    <div id="player-controls"><span id="pc-prev" onclick="prevSong()">&#9668;PREV</span> <span id="pc-playlist" data-plhidden="true" onclick="showPlaylist()">&#9660;</span> <span id="pc-next" onclick="nextSong()">NEXT&#9658;</span></div>
    <div id="playlist"></div>
</body>
</html>
